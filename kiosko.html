<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Kerapodo — Asistencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
:root {
  --bg:#f5f0e8;--bg2:#ede7d9;--navy:#1a2744;--navy2:#243258;
  --gold:#c9923a;--gold2:#e0a84a;--gold-pale:#f5e6cc;
  --white:#ffffff;--text:#1a2744;--muted:#7a8099;
  --green:#2d9e6b;--green-bg:#e8f7f0;
  --red:#d94f4f;--red-bg:#fdeaea;
  --orange:#e07820;--orange-bg:#fef0e0;
  --blue:#2d6be0;--blue-bg:#e0eaff;
  --radius:20px;--radius-sm:12px;
  --shadow-lg:0 20px 60px rgba(26,39,68,.18);
  --font-head:'Playfair Display',serif;--font-body:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;user-select:none}
.bg-deco{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-deco::before{content:'';position:absolute;top:-120px;right:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(201,146,58,.18) 0%,transparent 70%)}
.bg-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy))}
#app{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.card{background:var(--white);border-radius:28px;box-shadow:var(--shadow-lg);width:100%;max-width:380px;overflow:hidden;animation:slideUp .5s cubic-bezier(.34,1.4,.64,1)}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.card-header{background:var(--navy);padding:20px 24px 18px;text-align:center;position:relative;overflow:hidden}
.card-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(201,146,58,.12)}
.brand-logo{font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--white);position:relative;z-index:1}
.brand-logo span{color:var(--gold2)}
.brand-tag{font-size:10px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:2px;position:relative;z-index:1}
.reloj-bloque{margin-top:12px;position:relative;z-index:1}
.reloj-hora{font-family:var(--font-head);font-size:44px;font-weight:600;color:var(--white);line-height:1}
.reloj-fecha{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.sucursal-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(201,146,58,.2);border:1px solid rgba(201,146,58,.4);color:var(--gold2);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:4px 12px;border-radius:40px;margin-top:8px}
.sucursal-pill::before{content:'📍';font-size:9px}
.card-body{padding:20px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:16px}
.pin-label{font-size:12px;font-weight:500;color:var(--muted);text-align:center}
.pin-dots{display:flex;gap:12px;align-items:center;height:16px}
.pin-dot{width:10px;height:10px;border-radius:50%;background:var(--bg2);border:2px solid #d8d0c0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);transform:scale(1.3);box-shadow:0 0 0 4px rgba(201,146,58,.15)}
.teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.tecla{background:var(--bg);border:1.5px solid #e0d8cc;border-radius:var(--radius-sm);color:var(--navy);font-family:var(--font-body);font-size:20px;font-weight:600;aspect-ratio:1.2;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s ease;box-shadow:0 2px 6px rgba(26,39,68,.06)}
.tecla:active,.tecla.press{background:var(--gold-pale);border-color:var(--gold);color:var(--gold);transform:scale(.93)}
.tecla.del{font-size:16px;color:var(--muted)}
.tecla.del:active{color:var(--red);border-color:var(--red);background:var(--red-bg)}

/* BOTÓN ACCIÓN DINÁMICO */
.btn-accion{grid-column:span 3;aspect-ratio:auto;padding:14px;font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all .15s ease;box-shadow:0 4px 16px rgba(26,39,68,.2)}
.btn-accion.entrada  {background:var(--green);color:#fff}
.btn-accion.almuerzo {background:var(--orange);color:#fff}
.btn-accion.regreso  {background:var(--blue);color:#fff}
.btn-accion.salida   {background:var(--navy);color:#fff}
.btn-accion.loading  {background:var(--bg2);color:var(--muted);cursor:not-allowed}
.btn-accion:active   {transform:scale(.97)}

/* CÁMARA */
#cam-overlay{position:fixed;inset:0;z-index:150;background:rgba(26,39,68,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
#cam-overlay.show{display:flex}
.cam-titulo{font-family:var(--font-head);font-size:22px;color:var(--white);text-align:center}
.cam-wrap{position:relative;width:220px;height:220px}
#cam-video{width:220px;height:220px;object-fit:cover;border-radius:50%;transform:scaleX(-1)}
.cam-ring{position:absolute;inset:-6px;border-radius:50%;border:3px solid var(--gold);animation:pulseRing 1.5s ease-in-out infinite}
@keyframes pulseRing{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.04)}}
.cam-ring.ok{border-color:var(--green);animation:none}
.cam-ring.fail{border-color:var(--red);animation:none}
#cam-canvas{display:none}
.cam-status{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);text-align:center}
.cam-status.ok{color:var(--green)}
.cam-status.fail{color:var(--red)}
.cam-cancel{font-size:12px;color:rgba(255,255,255,.4);cursor:pointer;text-decoration:underline}

/* REGISTRO FACIAL */
#reg-overlay{position:fixed;inset:0;z-index:160;background:rgba(26,39,68,.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
#reg-overlay.show{display:flex}
.reg-titulo{font-family:var(--font-head);font-size:22px;color:var(--white)}
.reg-wrap{position:relative;width:200px;height:200px}
#reg-video{width:200px;height:200px;object-fit:cover;border-radius:50%;transform:scaleX(-1)}
.reg-ring{position:absolute;inset:-6px;border-radius:50%;border:3px solid rgba(201,146,58,.5)}
#reg-canvas{display:none}
.reg-nombre{font-size:14px;font-weight:600;color:var(--gold2)}
.reg-btn{background:var(--gold);color:#000;border:none;font-family:var(--font-body);font-size:13px;font-weight:700;padding:14px 32px;border-radius:var(--radius-sm);cursor:pointer}
.reg-btn:disabled{background:var(--bg2);color:var(--muted);cursor:not-allowed}
.reg-msg{font-size:12px;color:rgba(255,255,255,.6);text-align:center}
.reg-msg.ok{color:var(--green)}
.reg-msg.err{color:var(--red)}
.reg-cancel{font-size:12px;color:rgba(255,255,255,.3);cursor:pointer;text-decoration:underline}

/* RESULTADO */
#overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s ease;background:var(--bg)}
#overlay.show{opacity:1;pointer-events:all}
.overlay-card{background:var(--white);border-radius:28px;box-shadow:var(--shadow-lg);padding:32px 28px;width:100%;max-width:320px;display:flex;flex-direction:column;align-items:center;gap:10px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.overlay-card.entrada{border-top:4px solid var(--green)}
.overlay-card.salida_almuerzo{border-top:4px solid var(--orange)}
.overlay-card.regreso_almuerzo{border-top:4px solid var(--blue)}
.overlay-card.salida_final{border-top:4px solid var(--navy)}
.overlay-card.error{border-top:4px solid var(--red)}
.res-emoji{font-size:52px;line-height:1}
.res-nombre{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--navy);line-height:1.2}
.res-badge{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:5px 14px;border-radius:40px}
.res-badge.entrada{background:var(--green-bg);color:var(--green)}
.res-badge.salida_almuerzo{background:var(--orange-bg);color:var(--orange)}
.res-badge.regreso_almuerzo{background:var(--blue-bg);color:var(--blue)}
.res-badge.salida_final{background:#e8eaf6;color:var(--navy)}
.res-badge.error{background:var(--red-bg);color:var(--red)}
.res-hora{font-family:var(--font-head);font-size:36px;font-weight:600;color:var(--navy)}
.res-alertas{display:flex;flex-direction:column;gap:4px;width:100%}
.res-alerta{font-size:11px;background:var(--orange-bg);color:var(--orange);padding:6px 10px;border-radius:8px;text-align:left}
.barra-wrap{width:100%;height:3px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:4px}
.barra-fill{height:100%;border-radius:4px;width:100%;transform-origin:left;animation:shrink var(--dur,4s) linear forwards}
.barra-fill.entrada,.barra-fill.regreso_almuerzo{background:var(--green)}
.barra-fill.salida_almuerzo{background:var(--orange)}
.barra-fill.salida_final{background:var(--navy)}
.barra-fill.error{background:var(--red)}
@keyframes shrink{to{transform:scaleX(0)}}

/* ADMIN */
#admin-overlay{position:fixed;inset:0;z-index:200;background:rgba(26,39,68,.95);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
#admin-overlay.show{display:flex}
.admin-card{background:var(--white);border-radius:24px;padding:28px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
.admin-title{font-family:var(--font-head);font-size:22px;color:var(--navy);text-align:center}
.admin-field{display:flex;flex-direction:column;gap:5px}
.admin-field label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.admin-field input,.admin-field select{background:var(--bg);border:1.5px solid #e0d8cc;color:var(--navy);font-family:var(--font-body);font-size:14px;padding:10px 12px;border-radius:var(--radius-sm);outline:none;width:100%}
.admin-field input:focus,.admin-field select:focus{border-color:var(--gold)}
.admin-btn{background:var(--navy);color:var(--white);border:none;font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:13px;border-radius:var(--radius-sm);cursor:pointer}
.admin-btn.gold{background:var(--gold);color:#000}
.admin-msg{font-size:12px;text-align:center;color:var(--green)}
.admin-msg.err{color:var(--red)}
.admin-close{text-align:center;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline}
hr.div{border:none;border-top:1px solid #e8e0d4}
#admin-trigger{position:fixed;bottom:0;right:0;width:70px;height:70px;opacity:0;z-index:50}
</style>
</head>
<body>
<div class="bg-deco"><div class="bg-line"></div></div>
<div id="app">
  <div class="card">
    <div class="card-header">
      <div class="brand-logo">Kera<span>podo</span></div>
      <div class="brand-tag">Control de Asistencia</div>
      <div class="reloj-bloque">
        <div class="reloj-hora" id="reloj-hora">--:--</div>
        <div class="reloj-fecha" id="reloj-fecha">---</div>
      </div>
      <div class="sucursal-pill" id="sucursal-pill">Sin configurar</div>
    </div>
    <div class="card-body">
      <div class="pin-label" id="pin-label">Ingresa tu PIN para registrar tu asistencia</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="teclado" id="teclado">
        <div class="tecla" data-n="1">1</div><div class="tecla" data-n="2">2</div><div class="tecla" data-n="3">3</div>
        <div class="tecla" data-n="4">4</div><div class="tecla" data-n="5">5</div><div class="tecla" data-n="6">6</div>
        <div class="tecla" data-n="7">7</div><div class="tecla" data-n="8">8</div><div class="tecla" data-n="9">9</div>
        <div class="tecla del" data-n="del">⌫</div><div class="tecla" data-n="0">0</div>
        <button class="btn-accion entrada" id="btn-accion">🟢 Registrar Entrada</button>
      </div>
    </div>
  </div>
</div>

<!-- CÁMARA VERIFICACIÓN -->
<div id="cam-overlay">
  <div class="cam-titulo" id="cam-titulo">Verificando identidad</div>
  <div class="cam-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <div class="cam-ring" id="cam-ring"></div>
    <canvas id="cam-canvas"></canvas>
  </div>
  <div class="cam-status" id="cam-status">Activando cámara...</div>
  <div class="cam-cancel" onclick="cancelarCamara()">Cancelar</div>
</div>

<!-- REGISTRO FACIAL -->
<div id="reg-overlay">
  <div class="reg-titulo">Registrar Rostro</div>
  <div class="reg-nombre" id="reg-nombre">—</div>
  <div class="reg-wrap">
    <video id="reg-video" autoplay playsinline muted></video>
    <div class="reg-ring"></div>
    <canvas id="reg-canvas"></canvas>
  </div>
  <button class="reg-btn" id="reg-btn" onclick="capturarDescriptor()" disabled>📸 Capturar Rostro</button>
  <div class="reg-msg" id="reg-msg"></div>
  <div class="reg-cancel" onclick="cerrarRegistro()">Cancelar</div>
</div>

<!-- RESULTADO -->
<div id="overlay">
  <div class="overlay-card" id="overlay-card">
    <div class="res-emoji" id="res-emoji"></div>
    <div class="res-nombre" id="res-nombre"></div>
    <div class="res-badge" id="res-badge"></div>
    <div class="res-hora" id="res-hora"></div>
    <div class="res-alertas" id="res-alertas"></div>
    <div class="barra-wrap"><div class="barra-fill" id="barra-fill"></div></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-overlay">
  <div class="admin-card">
    <div class="admin-title">⚙️ Configuración</div>
    <div class="admin-field">
      <label>Contraseña admin</label>
      <input type="password" id="admin-pass" placeholder="••••••••"/>
    </div>
    <div class="admin-field">
      <label>Sucursal</label>
      <select id="admin-sucursal">
        <option value="">— Seleccionar —</option>
        <option>Centro</option><option>Naco</option><option>Bella Vista</option>
        <option>Piantini</option><option>Los Prados</option><option>Zona Oriental</option>
      </select>
    </div>
    <div class="admin-field">
      <label>URL del servidor</label>
      <input type="url" id="admin-url" placeholder="https://kerapodo-ponche.onrender.com"/>
    </div>
    <button class="admin-btn" onclick="guardarConfig()">Guardar configuración</button>
    <hr class="div"/>
    <div class="admin-field">
      <label>Registrar rostro de empleado</label>
      <select id="reg-select"><option value="">— Seleccionar empleado —</option></select>
    </div>
    <button class="admin-btn gold" onclick="iniciarRegistro()">📸 Registrar Rostro</button>
    <div class="admin-msg" id="admin-msg"></div>
    <div class="admin-close" onclick="cerrarAdmin()">Cerrar</div>
  </div>
</div>

<div id="admin-trigger" onclick="tapAdmin()"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
let CONFIG = {
  servidor: localStorage.getItem('kp_servidor')||'',
  sucursal: localStorage.getItem('kp_sucursal')||'',
  adminKey: localStorage.getItem('kp_adminKey')||'',
};
let descriptoresFaciales = JSON.parse(localStorage.getItem('kp_descriptores')||'{}');
Object.keys(descriptoresFaciales).forEach(k=>{
  if(!(descriptoresFaciales[k] instanceof Float32Array))
    descriptoresFaciales[k]=new Float32Array(Object.values(descriptoresFaciales[k]));
});
let modelsLoaded=false, empleadosLista=[];

// ACCIONES Y SUS PROPIEDADES
const ACCIONES = {
  sin_entrada:      { key:'entrada',         emoji:'🟢', label:'Registrar Entrada',    clase:'entrada' },
  en_trabajo:       { key:'salida_almuerzo', emoji:'🍽️', label:'Salida a Almorzar',    clase:'almuerzo' },
  en_almuerzo:      { key:'regreso_almuerzo',emoji:'🔄', label:'Regreso de Almuerzo',  clase:'regreso' },
  regreso_almuerzo: { key:'salida_final',    emoji:'👋', label:'Registrar Salida',     clase:'salida' },
  salio:            { key:null,              emoji:'✅', label:'Jornada Completada',   clase:'salida' },
};

function actualizarUI() {
  document.getElementById('sucursal-pill').textContent = CONFIG.sucursal||'Sin configurar';
}
actualizarUI();

// ── RELOJ ─────────────────────────────────────────────────────────────────────
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function tick(){
  const n=new Date();
  document.getElementById('reloj-hora').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('reloj-fecha').textContent=`${DIAS[n.getDay()]}, ${n.getDate()} de ${MESES[n.getMonth()]}`;
}
tick(); setInterval(tick,10000);

// ── MODELOS ───────────────────────────────────────────────────────────────────
const MODEL_URL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
async function cargarModelos(){
  if(modelsLoaded)return true;
  try{
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
    ]);
    modelsLoaded=true; return true;
  }catch(e){ console.error('Modelos:',e); return false; }
}
setTimeout(cargarModelos,2000);

// ── PIN ───────────────────────────────────────────────────────────────────────
let pin='', procesando=false, estadoActual='sin_entrada';

function actualizarDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pin.length));
}

function actualizarBoton(estado){
  estadoActual = estado;
  const info = ACCIONES[estado] || ACCIONES.sin_entrada;
  const btn = document.getElementById('btn-accion');
  btn.textContent = `${info.emoji} ${info.label}`;
  btn.className = `btn-accion ${info.clase}`;
  btn.disabled = info.key === null;
}

function presionar(n){
  if(procesando)return;
  if(n==='del'){pin=pin.slice(0,-1);}
  else if(n==='enter'||n==='accion'){if(pin.length>=4)iniciarPonche();return;}
  else{if(pin.length>=4)return;pin+=n;}
  actualizarDots();
  if(pin.length===4)setTimeout(()=>consultarEstadoYPonchar(),200);
}

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')presionar(e.key);
  else if(e.key==='Backspace')presionar('del');
  else if(e.key==='Enter')presionar('enter');
});
document.getElementById('teclado').addEventListener('click',e=>{
  const t=e.target.closest('.tecla,.btn-accion');
  if(!t)return;
  if(t.classList.contains('btn-accion')){presionar('accion');return;}
  t.classList.add('press');setTimeout(()=>t.classList.remove('press'),120);
  presionar(t.dataset.n);
});

function resetPIN(){
  pin='';procesando=false;actualizarDots();
  const btn=document.getElementById('btn-accion');
  btn.classList.remove('loading');
  actualizarBoton('sin_entrada');
}

// ── CONSULTAR ESTADO Y PONCHAR ────────────────────────────────────────────────
async function consultarEstadoYPonchar(){
  if(procesando||pin.length<4)return;
  if(!CONFIG.servidor){mostrarResultado('⚙️','Sin configurar','Configura el sistema','error',3,'');resetPIN();return;}
  procesando=true;
  const btn=document.getElementById('btn-accion');
  btn.classList.add('loading');btn.textContent='...';

  try{
    const r=await fetch(`${CONFIG.servidor}/estado`,{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':CONFIG.adminKey},body:JSON.stringify({pin})});
    const d=await r.json();
    if(!d.ok){mostrarResultado('❌','PIN incorrecto',d.error||'Intenta de nuevo','error',3,'');resetPIN();return;}

    actualizarBoton(d.estado);
    btn.classList.remove('loading');
    procesando=false;

    // Si ya completó la jornada
    if(d.estado==='salio'){
      mostrarResultado('✅',d.nombre,'JORNADA COMPLETADA','salida_final',4,d.estado);
      resetPIN();return;
    }

    // Guardar pin temporalmente para después de la cámara
    const pinTemp=pin;

    // Verificar cara si tiene descriptor
    if(descriptoresFaciales[pin]){
      const verificado=await verificarRostro(pin,d.nombre);
      if(!verificado){resetPIN();return;}
    }

    await enviarPonche(pinTemp,d.estado);
  }catch(e){
    mostrarResultado('📡','Sin conexión','Verifica el WiFi','error',3,'');
    resetPIN();
  }
}

async function iniciarPonche(){
  await consultarEstadoYPonchar();
}

// ── ENVIAR PONCHE ─────────────────────────────────────────────────────────────
async function enviarPonche(pinEmp, estadoEmp){
  const accionInfo = ACCIONES[estadoEmp];
  if(!accionInfo||!accionInfo.key)return;

  try{
    const r=await fetch(`${CONFIG.servidor}/ponche`,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-key':CONFIG.adminKey},
      body:JSON.stringify({pin:pinEmp,sucursal:CONFIG.sucursal,accion:accionInfo.key}),
    });
    const d=await r.json();
    const ahora=new Date();
    const hora=`${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;

    if(d.ok){
      mostrarResultado(accionInfo.emoji,d.nombre,d.mensaje,accionInfo.key,5,hora,d.alertas||[]);
    }else{
      mostrarResultado('❌','Error',d.error||'Intenta de nuevo','error',3,'');
    }
  }catch(e){
    mostrarResultado('📡','Sin conexión','Verifica el WiFi','error',3,'');
  }
  resetPIN();
}

// ── VERIFICACIÓN FACIAL ───────────────────────────────────────────────────────
let streamActivo=null,pinPendiente=null;

async function verificarRostro(pinEmp,nombre){
  return new Promise(async(resolve)=>{
    pinPendiente={pin:pinEmp,resolve};
    const ov=document.getElementById('cam-overlay');
    const status=document.getElementById('cam-status');
    const ring=document.getElementById('cam-ring');
    document.getElementById('cam-titulo').textContent=nombre?`Hola, ${nombre.split(' ')[0]}`:'Verificando identidad';
    ov.classList.add('show');
    status.textContent='Activando cámara...';
    status.className='cam-status';
    ring.className='cam-ring';
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
      streamActivo=stream;
      const video=document.getElementById('cam-video');
      video.srcObject=stream;
      await new Promise(r=>video.onloadedmetadata=r);
      if(!modelsLoaded){status.textContent='Cargando IA...';await cargarModelos();}
      status.textContent='Mirá directo a la cámara 👁️';
      const descriptor=descriptoresFaciales[pinEmp];
      const matcher=new faceapi.FaceMatcher([new faceapi.LabeledFaceDescriptors(pinEmp,[descriptor])],0.5);
      let intentos=0;
      const iv=setInterval(async()=>{
        intentos++;
        try{
          const det=await faceapi.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks(true).withFaceDescriptor();
          if(det){
            const res=matcher.findBestMatch(det.descriptor);
            if(res.label===pinEmp){
              clearInterval(iv);ring.className='cam-ring ok';
              status.textContent='✅ Identidad confirmada';status.className='cam-status ok';
              setTimeout(()=>{detenerStream();ov.classList.remove('show');resolve(true);},800);
            }
          }else{status.textContent=intentos<8?'Buscando tu rostro...':'Acerca más el teléfono 📱';}
        }catch(e){}
        if(intentos>=16){
          clearInterval(iv);ring.className='cam-ring fail';
          status.textContent='❌ No se pudo verificar';status.className='cam-status fail';
          setTimeout(()=>{detenerStream();ov.classList.remove('show');resolve(false);},1500);
        }
      },500);
    }catch(e){
      status.textContent='Error con la cámara';status.className='cam-status fail';
      setTimeout(()=>{detenerStream();ov.classList.remove('show');resolve(false);},2000);
    }
  });
}

function cancelarCamara(){detenerStream();document.getElementById('cam-overlay').classList.remove('show');if(pinPendiente){pinPendiente.resolve(false);pinPendiente=null;}procesando=false;}
function detenerStream(){if(streamActivo){streamActivo.getTracks().forEach(t=>t.stop());streamActivo=null;}}

// ── RESULTADO ─────────────────────────────────────────────────────────────────
let overlayTimer=null;
function mostrarResultado(emoji,nombre,badge,tipo,seg,hora,alertas=[]){
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-nombre').textContent=nombre;
  const b=document.getElementById('res-badge');b.textContent=badge;b.className=`res-badge ${tipo}`;
  document.getElementById('res-hora').textContent=hora;
  const al=document.getElementById('res-alertas');
  al.innerHTML=alertas.map(a=>`<div class="res-alerta">${a}</div>`).join('');
  const oc=document.getElementById('overlay-card');oc.className=`overlay-card ${tipo}`;
  const bf=document.getElementById('barra-fill');bf.className=`barra-fill ${tipo}`;
  bf.style.setProperty('--dur',`${seg}s`);bf.style.animation='none';bf.offsetHeight;bf.style.animation='';
  const ov=document.getElementById('overlay');ov.classList.add('show');
  if(overlayTimer)clearTimeout(overlayTimer);
  overlayTimer=setTimeout(()=>ov.classList.remove('show'),seg*1000);
}
document.getElementById('overlay').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('show');if(overlayTimer)clearTimeout(overlayTimer);});

// ── REGISTRO FACIAL ───────────────────────────────────────────────────────────
let regStream=null;
async function iniciarRegistro(){
  const sel=document.getElementById('reg-select');
  const pinSel=sel.value;
  const nombre=sel.options[sel.selectedIndex]?.text;
  if(!pinSel){const m=document.getElementById('admin-msg');m.textContent='Selecciona un empleado';m.className='admin-msg err';return;}
  cerrarAdmin();
  document.getElementById('reg-nombre').textContent=nombre;
  document.getElementById('reg-msg').textContent='';
  document.getElementById('reg-overlay').classList.add('show');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    regStream=stream;
    const video=document.getElementById('reg-video');video.srcObject=stream;
    if(!modelsLoaded){document.getElementById('reg-msg').textContent='Cargando modelos...';await cargarModelos();}
    document.getElementById('reg-msg').textContent='Coloca tu cara en el círculo y presiona Capturar.';
    document.getElementById('reg-btn').disabled=false;
    document.getElementById('reg-btn').dataset.pin=pinSel;
  }catch(e){document.getElementById('reg-msg').textContent='Error con la cámara';document.getElementById('reg-msg').className='reg-msg err';}
}

async function capturarDescriptor(){
  const btn=document.getElementById('reg-btn');
  const msg=document.getElementById('reg-msg');
  const pinEmp=btn.dataset.pin;
  btn.disabled=true;msg.textContent='Detectando rostro...';msg.className='reg-msg';
  try{
    const video=document.getElementById('reg-video');
    const det=await faceapi.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks(true).withFaceDescriptor();
    if(!det){msg.textContent='No se detectó rostro. Intenta de nuevo.';msg.className='reg-msg err';btn.disabled=false;return;}
    descriptoresFaciales[pinEmp]=det.descriptor;
    const plain={};det.descriptor.forEach((v,i)=>plain[i]=v);
    const stored=JSON.parse(localStorage.getItem('kp_descriptores')||'{}');
    stored[pinEmp]=plain;localStorage.setItem('kp_descriptores',JSON.stringify(stored));
    msg.textContent='✅ Rostro registrado';msg.className='reg-msg ok';
    setTimeout(()=>cerrarRegistro(),1500);
  }catch(e){msg.textContent='Error: '+e.message;msg.className='reg-msg err';btn.disabled=false;}
}

function cerrarRegistro(){if(regStream){regStream.getTracks().forEach(t=>t.stop());regStream=null;}document.getElementById('reg-overlay').classList.remove('show');document.getElementById('reg-btn').disabled=true;}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
let tapCount=0,tapTimer=null;
function tapAdmin(){tapCount++;if(tapTimer)clearTimeout(tapTimer);if(tapCount>=5){tapCount=0;abrirAdmin();}else tapTimer=setTimeout(()=>tapCount=0,2000);}

async function abrirAdmin(){
  document.getElementById('admin-pass').value='';
  document.getElementById('admin-sucursal').value=CONFIG.sucursal||'';
  document.getElementById('admin-url').value=CONFIG.servidor||'';
  document.getElementById('admin-msg').textContent='';
  const sel=document.getElementById('reg-select');
  sel.innerHTML='<option value="">— Seleccionar empleado —</option>';
  if(CONFIG.servidor&&CONFIG.adminKey){
    try{
      const r=await fetch(`${CONFIG.servidor}/admin/empleados`,{headers:{'x-admin-key':CONFIG.adminKey}});
      const d=await r.json();
      empleadosLista=d.empleados||[];
      empleadosLista.forEach(e=>{const o=document.createElement('option');o.value=e.pin;o.textContent=`${e.nombre} (${e.pin})`;sel.appendChild(o);});
    }catch(e){}
  }
  document.getElementById('admin-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('admin-pass').focus(),200);
}

function cerrarAdmin(){document.getElementById('admin-overlay').classList.remove('show');}

function guardarConfig(){
  const pass=document.getElementById('admin-pass').value.trim();
  const suc=document.getElementById('admin-sucursal').value;
  const url=document.getElementById('admin-url').value.trim();
  const msg=document.getElementById('admin-msg');
  if(!pass){msg.textContent='Ingresa la contraseña';msg.className='admin-msg err';return;}
  if(!suc){msg.textContent='Selecciona una sucursal';msg.className='admin-msg err';return;}
  if(!url){msg.textContent='Ingresa la URL';msg.className='admin-msg err';return;}
  CONFIG={servidor:url.replace(/\/$/,''),sucursal:suc,adminKey:pass};
  localStorage.setItem('kp_servidor',CONFIG.servidor);
  localStorage.setItem('kp_sucursal',CONFIG.sucursal);
  localStorage.setItem('kp_adminKey',CONFIG.adminKey);
  actualizarUI();msg.textContent='✓ Guardado';msg.className='admin-msg';
  setTimeout(cerrarAdmin,1500);
}
</script>
