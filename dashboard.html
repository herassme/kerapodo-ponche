<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kerapodo — Dashboard en Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root {
  --blue:       #1a4f8a;
  --blue-dark:  #133d6e;
  --blue-light: #2563aa;
  --blue-pale:  #e8f0fb;
  --white:      #ffffff;
  --gray-50:    #f8f9fb;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1ea;
  --gray-400:   #9aa3b5;
  --gray-600:   #5a6478;
  --gray-900:   #111827;
  --green:      #0d7a55;
  --green-pale: #e6f5ef;
  --amber:      #b45309;
  --amber-pale: #fef3e2;
  --red:        #c0392b;
  --red-pale:   #fdecea;
  --shadow-sm:  0 1px 3px rgba(17,24,39,.06);
  --shadow-md:  0 4px 12px rgba(17,24,39,.08), 0 2px 4px rgba(17,24,39,.04);
  --shadow-xl:  0 24px 64px rgba(17,24,39,.16), 0 8px 24px rgba(17,24,39,.08);
  --radius:     12px;
  --radius-lg:  20px;
  --radius-xl:  28px;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--gray-50);font-family:var(--font-body);color:var(--gray-900);overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(26,79,138,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 100% 100%,rgba(26,79,138,.04) 0%,transparent 60%);pointer-events:none}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--gray-50)}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(26,79,138,.06) 0%,transparent 70%);pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:100%;max-width:380px;overflow:hidden;animation:cardIn .6s var(--ease-spring) both;border:1px solid var(--gray-100)}
@keyframes cardIn{from{transform:translateY(24px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.login-head{background:var(--blue);padding:28px;position:relative;overflow:hidden}
.login-head::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 110% -20%,rgba(255,255,255,.1) 0%,transparent 55%);pointer-events:none}
.login-logo{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.login-logo-text{font-family:var(--font-display);font-style:italic;font-size:28px;font-weight:700;color:var(--white);letter-spacing:-.01em;line-height:1}
.login-tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:4px;position:relative;z-index:1}
.login-body{padding:28px;display:flex;flex-direction:column;gap:14px}
.login-input{width:100%;background:var(--gray-50);border:1.5px solid var(--gray-200);color:var(--gray-900);padding:13px 16px;border-radius:var(--radius);outline:none;font-family:var(--font-body);font-size:15px;text-align:center;letter-spacing:.1em;transition:border-color .2s}
.login-input:focus{border-color:var(--blue);background:var(--white)}
.login-btn{width:100%;background:var(--blue);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;padding:14px;cursor:pointer;box-shadow:0 2px 8px rgba(26,79,138,.35);transition:all .15s}
.login-btn:hover{background:var(--blue-light)}
.login-btn:active{transform:scale(.98)}
.login-err{font-size:12px;color:var(--red);min-height:16px;font-weight:500;text-align:center}

/* ── DASHBOARD ── */
#dashboard{display:none;position:relative;z-index:1;height:100vh;flex-direction:column}
.dash-head{background:var(--blue);padding:16px 24px;position:relative;overflow:hidden;flex-shrink:0}
.dash-head::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 110% -20%,rgba(255,255,255,.1) 0%,transparent 55%);pointer-events:none}
.dash-head-row{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
.dash-logo{display:flex;align-items:center;gap:10px}
.dash-logo-text{font-family:var(--font-display);font-style:italic;font-size:22px;font-weight:700;color:var(--white);letter-spacing:-.01em}
.dash-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:dp 2s infinite}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.dash-clock{font-family:var(--font-display);font-size:34px;color:var(--white);letter-spacing:-.02em;line-height:1;text-align:right}
.dash-date{font-size:10px;color:rgba(255,255,255,.5);text-align:right;margin-top:2px}
.dash-upd{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:.04em}
.dash-filters{display:flex;gap:6px;margin-top:12px;position:relative;z-index:1;flex-wrap:wrap}
.fbtn{font-size:11px;font-weight:500;padding:5px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.fbtn:hover{background:rgba(255,255,255,.1);color:var(--white)}
.fbtn.active{background:var(--white);color:var(--blue);border-color:var(--white);font-weight:600}

/* KPIs */
.dash-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 20px 0;flex-shrink:0}
.kpi{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--radius-lg);padding:14px 18px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:2px}
.kpi-v{font-family:var(--font-display);font-size:30px;font-weight:400;line-height:1}
.kpi-l{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.kpi.verde{border-top:3px solid var(--green)}.kpi.verde .kpi-v{color:var(--green)}
.kpi.amber{border-top:3px solid var(--amber)}.kpi.amber .kpi-v{color:var(--amber)}
.kpi.gris {border-top:3px solid var(--gray-400)}.kpi.gris  .kpi-v{color:var(--gray-600)}
.kpi.rojo {border-top:3px solid var(--red)}.kpi.rojo  .kpi-v{color:var(--red)}

/* Grid */
.dash-body{flex:1;overflow-y:auto;padding:12px 20px 16px}
.dash-body::-webkit-scrollbar{width:4px}
.dash-body::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}

.ecard{background:var(--white);border:1.5px solid var(--gray-100);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:5px;animation:eIn .3s var(--ease-spring) both;transition:opacity .3s}
@keyframes eIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ecard.trabajando{border-left:3px solid var(--green)}
.ecard.almuerzo  {border-left:3px solid var(--amber)}
.ecard.salio     {border-left:3px solid var(--gray-200);opacity:.7}
.ecard.ausente   {border-left:3px solid var(--red);opacity:.6}

.etop{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.ename{font-size:13px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ebadge{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:100px;flex-shrink:0}
.ebadge.trabajando{background:var(--green-pale);color:var(--green)}
.ebadge.almuerzo  {background:var(--amber-pale);color:var(--amber)}
.ebadge.salio     {background:var(--gray-100);color:var(--gray-600)}
.ebadge.ausente   {background:var(--red-pale);color:var(--red)}

.ehoras{font-family:var(--font-display);font-size:20px;color:var(--gray-900);line-height:1}
.ecard.trabajando .ehoras{color:var(--green)}
.ecard.almuerzo   .ehoras{color:var(--amber)}
.etimes{display:flex;gap:8px;font-size:11px;color:var(--gray-400)}
.etarde{display:inline-block;font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-pale);border-radius:4px;padding:1px 6px}

.dash-foot{padding:8px 20px;text-align:center;font-size:10px;color:var(--gray-400);letter-spacing:.06em;border-top:1px solid var(--gray-100);flex-shrink:0;background:var(--white)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-head">
      <div class="login-logo">
        <div class="login-logo-text">KERAPODO</div>
        <svg viewBox="0 0 32 42" fill="none" style="height:26px;width:auto">
          <ellipse cx="16" cy="30" rx="10" ry="12" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" fill="none"/>
          <ellipse cx="6"  cy="12" rx="3"  ry="4"  stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none"/>
          <ellipse cx="13" cy="7"  rx="3"  ry="3.8" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none"/>
          <ellipse cx="21" cy="6"  rx="2.8" ry="3.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none"/>
          <ellipse cx="28" cy="9"  rx="2.5" ry="3.2" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div class="login-tag">Dashboard · Control de Asistencia en Vivo</div>
    </div>
    <div class="login-body">
      <input type="password" class="login-input" id="dash-pass" placeholder="Contraseña admin" onkeydown="if(event.key==='Enter')dashLogin()"/>
      <button class="login-btn" onclick="dashLogin()">Acceder al Dashboard</button>
      <div class="login-err" id="dash-err"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-head">
    <div class="dash-head-row">
      <div>
        <div class="dash-logo">
          <div class="dash-dot"></div>
          <div class="dash-logo-text">KERAPODO · EN VIVO</div>
          <svg viewBox="0 0 32 42" fill="none" style="height:20px;width:auto">
            <ellipse cx="16" cy="30" rx="10" ry="12" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" fill="none"/>
            <ellipse cx="6"  cy="12" rx="3"  ry="4"  stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
            <ellipse cx="13" cy="7"  rx="3"  ry="3.8" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
            <ellipse cx="21" cy="6"  rx="2.8" ry="3.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
            <ellipse cx="28" cy="9"  rx="2.5" ry="3.2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <div class="dash-upd" id="dash-upd">Conectando...</div>
      </div>
      <div>
        <div class="dash-clock" id="dash-clock">--:--</div>
        <div class="dash-date" id="dash-date">---</div>
      </div>
    </div>
    <div class="dash-filters">
      <button class="fbtn active" onclick="filtrar('todos')"      id="f-todos">Todos</button>
      <button class="fbtn"        onclick="filtrar('trabajando')" id="f-trabajando">🟢 Dentro</button>
      <button class="fbtn"        onclick="filtrar('almuerzo')"   id="f-almuerzo">🍽 Almuerzo</button>
      <button class="fbtn"        onclick="filtrar('salio')"      id="f-salio">✅ Salieron</button>
      <button class="fbtn"        onclick="filtrar('ausente')"    id="f-ausente">⚠️ Ausentes</button>
    </div>
  </div>

  <div class="dash-kpis">
    <div class="kpi verde"><div class="kpi-v" id="k-t">—</div><div class="kpi-l">🟢 Dentro ahora</div></div>
    <div class="kpi amber"><div class="kpi-v" id="k-a">—</div><div class="kpi-l">🍽 En almuerzo</div></div>
    <div class="kpi gris" ><div class="kpi-v" id="k-s">—</div><div class="kpi-l">✅ Salieron</div></div>
    <div class="kpi rojo" ><div class="kpi-v" id="k-au">—</div><div class="kpi-l">⚠️ Sin registro</div></div>
  </div>

  <div class="dash-body">
    <div class="dash-grid" id="dash-grid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400);font-size:13px">Cargando datos...</div>
    </div>
  </div>

  <div class="dash-foot">KERAPODO GROUP SRL · Sistema de Control de Asistencia · Actualización automática cada 30 segundos</div>
</div>

<script>
const SERVIDOR = window.location.origin;
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
let adminKey='', filtroActivo='todos', todosEmpleados=[];
const ORDEN = {trabajando:0,almuerzo:1,salio:2,ausente:3};
const BADGE  = {trabajando:'Dentro',almuerzo:'Almuerzo',salio:'Salió',ausente:'Ausente'};

function tick(){
  const n=new Date();
  document.getElementById('dash-clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('dash-date').textContent=`${DIAS[n.getDay()]}, ${n.getDate()} de ${MESES[n.getMonth()]}`;
}
setInterval(tick,1000);tick();

async function dashLogin(){
  const pass=document.getElementById('dash-pass').value.trim();
  const err=document.getElementById('dash-err');
  if(!pass){err.textContent='Ingresa la contraseña';return;}
  err.textContent='Verificando...';
  try{
    const r=await fetch(`${SERVIDOR}/admin/verificar`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:pass})});
    const d=await r.json();
    if(d.ok){
      adminKey=pass;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('dashboard').style.display='flex';
      cargarDatos();
      setInterval(cargarDatos,30000);
    }else{err.textContent='Contraseña incorrecta';document.getElementById('dash-pass').value='';}
  }catch(e){err.textContent='Sin conexión al servidor';}
}

async function cargarDatos(){
  try{
    const r=await fetch(`${SERVIDOR}/admin/en-vivo`,{headers:{'x-admin-key':adminKey}});
    const d=await r.json();
    if(!d.ok)return;
    todosEmpleados=d.empleados;
    document.getElementById('k-t').textContent=d.resumen.trabajando;
    document.getElementById('k-a').textContent=d.resumen.almuerzo;
    document.getElementById('k-s').textContent=d.resumen.salio;
    document.getElementById('k-au').textContent=d.resumen.ausente;
    renderEmpleados();
    const n=new Date();
    document.getElementById('dash-upd').textContent=`Actualizado: ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  }catch(e){document.getElementById('dash-upd').textContent='⚠️ Sin conexión — reintentando...';}
}

function filtrar(tipo){
  filtroActivo=tipo;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`f-${tipo}`).classList.add('active');
  renderEmpleados();
}

function renderEmpleados(){
  const lista=filtroActivo==='todos'?[...todosEmpleados]:todosEmpleados.filter(e=>e.estado===filtroActivo);
  lista.sort((a,b)=>(ORDEN[a.estado]||0)-(ORDEN[b.estado]||0)||a.nombre.localeCompare(b.nombre));
  const grid=document.getElementById('dash-grid');
  if(!lista.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400);font-size:13px">Sin registros para este filtro</div>';return;}
  grid.innerHTML=lista.map((e,i)=>`
    <div class="ecard ${e.estado}" style="animation-delay:${i*.02}s">
      <div class="etop">
        <div class="ename">${e.nombre.split(' ').slice(0,2).join(' ')}</div>
        <span class="ebadge ${e.estado}">${BADGE[e.estado]||e.estado}</span>
      </div>
      <div class="ehoras">${e.horas}</div>
      <div class="etimes">
        ${e.horaEntrada?`<span>↑ ${e.horaEntrada}</span>`:'<span style="color:var(--red)">Sin entrada</span>'}
        ${e.horaSalida?`<span>↓ ${e.horaSalida}</span>`:''}
      </div>
      ${e.tardanza>0?`<span class="etarde">+${e.tardanza}m tarde</span>`:''}
    </div>`).join('');
}
</script>
</body>
</html>
